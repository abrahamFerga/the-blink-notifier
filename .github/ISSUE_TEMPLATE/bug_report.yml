name: Bug report
description: Something isn't working as expected
labels: ["type:bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as you can.

  - type: dropdown
    id: artifact
    attributes:
      label: Which version are you using?
      options:
        - Portable EXE (downloaded from GitHub Releases)
        - MSIX from Microsoft Store
        - Built from source
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: From the release tag or download filename (e.g. 1.0.0)
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: windows-version
    attributes:
      label: Windows version
      description: Settings → System → About → OS build, e.g. "Windows 11 23H2 (22631)"
      placeholder: "Windows 11 23H2 (22631)"
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open settings
        2. Set interval to …
        3. …
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Log file (optional)
      description: |
        Paste relevant lines from `%LOCALAPPDATA%\BlinkNotifier\logs\`.
        The log rotates daily; grab today's file.
      render: text
