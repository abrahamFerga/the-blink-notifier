version: 2
updates:
  # Root — src projects and solution-level packages
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      microsoft-extensions:
        patterns:
          - "Microsoft.Extensions.*"
      serilog:
        patterns:
          - "Serilog*"

  # Test projects — explicit entries so grouped updates cover all four
  - package-ecosystem: nuget
    directory: "/tests/BlinkNotifier.App.Tests"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      test-tooling:
        patterns:
          - "xunit*"
          - "Microsoft.NET.Test.Sdk"
          - "coverlet*"
          - "Microsoft.Extensions.Logging.Abstractions"

  - package-ecosystem: nuget
    directory: "/tests/BlinkNotifier.Core.Tests"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      test-tooling:
        patterns:
          - "xunit*"
          - "Microsoft.NET.Test.Sdk"
          - "coverlet*"
          - "Microsoft.Extensions.TimeProvider.Testing"

  - package-ecosystem: nuget
    directory: "/tests/BlinkNotifier.Settings.Tests"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      test-tooling:
        patterns:
          - "xunit*"
          - "Microsoft.NET.Test.Sdk"
          - "coverlet*"
          - "Microsoft.Extensions.Options"

  - package-ecosystem: nuget
    directory: "/tests/BlinkNotifier.Integration.Tests"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      test-tooling:
        patterns:
          - "xunit*"
          - "Microsoft.NET.Test.Sdk"
          - "coverlet*"
          - "Microsoft.Extensions.Logging.Abstractions"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
